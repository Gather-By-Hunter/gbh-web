name: Deploy Web

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy to
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      command:
        description: Pulumi command to run
        required: true
        default: preview
        type: choice
        options:
          - preview
          - up

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: ${{ inputs.command }} ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Frontend Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Frontend
        run: pnpm build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Install Infrastructure Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: infrastructure

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-2
          role-session-name: github-actions-deployment
          audience: sts.amazonaws.com

      - name: Pulumi Login
        run: pulumi login ${{ vars.PULUMI_BACKEND_URL }}

      - name: Pulumi Preview
        if: ${{ inputs.command == 'preview' }}
        run: pulumi preview --stack "${{ vars.PULUMI_STACK_NAME }}" --non-interactive
        working-directory: infrastructure
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      - name: Pulumi Up
        if: ${{ inputs.command == 'up' }}
        run: pulumi up --stack "${{ vars.PULUMI_STACK_NAME }}" --yes --non-interactive
        working-directory: infrastructure
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
